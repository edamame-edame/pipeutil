name: Feature Request
description: Propose a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Please describe your proposal in detail.

  - type: textarea
    id: motivation
    attributes:
      label: Background / Problem
      description: Explain why this feature is needed and what the current limitation is.
      placeholder: "e.g. The current PipeServer only supports 1-to-1 connections; it cannot handle multiple clients."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API / Behavior
      description: Describe the API or behavior change you want (code examples welcome).
      placeholder: |
        ```cpp
        MultiPipeServer server("my_pipe");
        server.serve([](PipeServer conn) { ... });
        ```
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: "✅ Test Plan (Required)"
      description: |
        Describe how you plan to test this feature.
        Proposals without a test plan will receive lower review priority.
      placeholder: |
        - C++: `tests/cpp/test_multi_server.cpp` — 3 simultaneous client connections
        - Python: `tests/python/test_multi_server.py` — `TestMultiConnect::test_3_clients`
        - Boundary: PipeException is raised when max_connections is exceeded
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority (from proposer's perspective)
      options:
        - High — blocking my work or development
        - Medium — would be useful
        - Low — nice to have eventually
    validations:
      required: true

  - type: input
    id: proposal_ref
    attributes:
      label: Proposal Reference (optional)
      description: "Enter the number from `docs/feature_proposals_v0.2.md` if applicable"
      placeholder: "F-001"
