name: 機能提案
description: 新機能・改善案を提案する
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 機能提案
        提案内容を具体的に記入してください。

  - type: textarea
    id: motivation
    attributes:
      label: 背景・課題
      description: なぜこの機能が必要か、現状の問題点を説明してください。
      placeholder: "例：現在の PipeServer は 1 対 1 のみで、複数クライアントを扱えない。"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 提案する API / 動作
      description: 追加・変更したい API を具体的に（コード例歓迎）。
      placeholder: |
        ```cpp
        MultiPipeServer server("my_pipe");
        server.serve([](PipeServer conn) { ... });
        ```
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: ✅ テスト計画（必須）
      description: |
        この機能をどのようにテストするか記載してください。
        テスト計画のない提案はレビュー優先度が下がります。
      placeholder: |
        - C++: `tests/cpp/test_multi_server.cpp` — 3 クライアント同時接続テスト
        - Python: `tests/python/test_multi_server.py` — `TestMultiConnect::test_3_clients`
        - 境界値: max_connections 超過時に PipeException が発生すること
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度（提案者視点）
      options:
        - High — 業務・開発に支障あり
        - Medium — あると便利
        - Low — いつかほしい
    validations:
      required: true

  - type: input
    id: proposal_ref
    attributes:
      label: 提案書参照（任意）
      description: "`docs/feature_proposals_v0.2.md` の番号があれば記入"
      placeholder: "F-001"
