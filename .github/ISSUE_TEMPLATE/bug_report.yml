name: Bug Report
description: Report a defect such as a crash or incorrect behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: "e.g. PipeServer::receive does not return when a client connects then immediately disconnects"
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Call PipeServer.listen / accept
        2. Connect a client and immediately close it
        3. receive() blocks indefinitely
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: "A ConnectionReset exception should be raised"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      multiple: true
      options:
        - Windows 11
        - Windows 10
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pipeutil Version
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: textarea
    id: test_case
    attributes:
      label: "✅ Regression Test Sketch (optional but recommended)"
      description: |
        Providing a test case sketch helps speed up the fix.
      placeholder: |
        ```python
        def test_immediate_disconnect_raises_connection_reset(make_server):
            ...
        ```
