# nightly.yml — 夜間フルマトリクス検証ワークフロー
#
# 実行マトリクス方針（parent_reviewer_proposal 提案B 採用）:
#   Windows + Linux × Python 3.8 / 3.11 / 3.13 / 3.14
#
# トリガー:
#   - 毎日 UTC 02:00 自動実行
#   - master / main への push 時（任意でコメントアウト可）
#   - workflow_dispatch による手動実行
#
# 役割分担:
#   ci.yml     → PR の高速フィードバック（圧縮マトリクス）
#   nightly.yml → 全サポートバージョンの互換性網羅検証
name: Nightly Full Matrix

on:
  schedule:
    - cron: "0 2 * * *"   # UTC 02:00 毎日
  workflow_dispatch:       # 手動実行

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# Job 1: C++ ユニットテスト（ci.yml と同一 — 夜間でも健全性を維持）
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  cpp-tests:
    name: "[Nightly] C++ Tests / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset_cfg: vs-test
            preset_build: build-test
            preset_test: run-test
          - os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.25.0"

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build gcc g++

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake --preset ${{ matrix.preset_cfg }}

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build/linux-test \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DPIPEUTIL_BUILD_PYTHON=OFF \
            -DPIPEUTIL_BUILD_TESTS=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build --preset ${{ matrix.preset_build }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build/linux-test

      - name: Run CTest (Windows)
        if: runner.os == 'Windows'
        run: ctest --preset ${{ matrix.preset_test }}

      - name: Run CTest (Linux)
        if: runner.os == 'Linux'
        run: ctest --test-dir build/linux-test --output-on-failure

# ─────────────────────────────────────────────────────────────────────────────
# Job 2: Python テスト フルマトリクス
#   Windows + Linux × 3.8 / 3.11 / 3.13 / 3.14
# ─────────────────────────────────────────────────────────────────────────────
  python-tests:
    name: "[Nightly] Python Tests / ${{ matrix.os }} / py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
        python-version: ["3.8", "3.11", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.25.0"

      - name: Install MSVC (Windows only — included in runner)
        if: runner.os == 'Windows'
        run: echo "MSVC is pre-installed on windows-latest"

      - name: Install build tools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y gcc g++ ninja-build

      - name: Install Python build & test dependencies
        run: pip install build scikit-build-core cmake pytest pytest-timeout

      - name: Build wheel
        run: python -m build --wheel

      - name: Install wheel
        shell: bash
        run: pip install dist/*.whl

      - name: Run pytest
        run: pytest tests/python/ -v --tb=short --timeout=30
